<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Producto | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
    <div class="se-subtitle">Administrador</div>
</header>

<nav class="se-nav">
    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/productos}">Gestión de Productos</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/productos/catalogo}">Ver Catálogo</a>
</nav>

<main class="container mb-5">

    <section class="se-form-card">

        <h2 class="se-title">Formulario de Producto</h2>

        <form th:action="@{/productos/guardar}"
              th:object="${producto}"
              method="post">

            <input type="hidden" th:field="*{id}">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nombre</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}">
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Precio</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{precio}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('precio')}"
                         th:errors="*{precio}">
                    </div>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea class="form-control"
                          rows="3"
                          th:field="*{descripcion}">
                </textarea>

                <div class="text-danger"
                     th:if="${#fields.hasErrors('descripcion')}"
                     th:errors="*{descripcion}">
                </div>
            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Stock</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{stock}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}">
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Categoría</label>
                    <select class="form-select"
                            th:field="*{categoria}">

                        <option value="">Seleccione una categoría</option>

                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>
                </div>

            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Imagen (URL)</label>
                <input type="text"
                       class="form-control"
                       th:field="*{imagen}"
                       placeholder="https://ejemplo.com/imagen.jpg">
            </div>

            <div class="d-flex justify-content-center gap-3">

                <button type="submit"
                        class="se-btn-blue">
                    Guardar Producto
                </button>

                <a th:href="@{/productos}"
                   class="se-btn-yellow">
                    Cancelar
                </a>

            </div>

        </form>

    </section>

</main>

</body>
</html>
