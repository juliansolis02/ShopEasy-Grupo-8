<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Catálogo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">

        Catálogo de Productos

    </h1>

    <form class="row mb-5"
          method="get"
          th:action="@{/productos/catalogo}">

        <div class="col-md-10">

            <input type="text"
                   class="form-control"
                   name="nombre"
                   th:value="${nombre}"
                   placeholder="Buscar producto...">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">

                Buscar

            </button>

        </div>

    </form>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="p : ${productos}">

            <div class="card h-100 shadow">

                <img th:if="${p.imagen!=null}"
                     th:src="${p.imagen}"
                     class="card-img-top">

                <div class="card-body">

                    <h4 th:text="${p.nombre}"></h4>

                    <p th:text="${p.descripcion}"></p>

                    <h5 class="text-success">

                        ₡ <span th:text="${p.precio}"></span>

                    </h5>

                    <p>

                        Categoría:

                        <span th:text="${p.categoria.nombre}"></span>

                    </p>

                    <p>

                        Stock:

                        <span th:text="${p.stock}"></span>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
