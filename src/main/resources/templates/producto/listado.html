<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Productos | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>Gestión de Productos</h2>

        <a class="btn btn-success"
           th:href="@{/productos/nuevo}">

            Nuevo Producto

        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>

            </tr>

        </thead>

        <tbody>

            <tr th:each="p : ${productos}"
                th:class="${p.stock <= 5} ? 'table-danger' : ''">

                <td th:text="${p.id}"></td>

                <td>

                    <img th:if="${p.imagen != null and !#strings.isEmpty(p.imagen)}"
                         th:src="${p.imagen}"
                         width="70"
                         class="img-thumbnail"/>

                    <span th:if="${p.imagen == null or #strings.isEmpty(p.imagen)}">
                        Sin imagen
                    </span>

                </td>

                <td th:text="${p.nombre}"></td>

                <td th:text="${p.descripcion}"></td>

                <td th:text="${p.precio}"></td>

                <td>

                    <span th:text="${p.stock}"></span>

                    <span class="badge bg-danger"
                          th:if="${p.stock <= 5}">
                        Stock Bajo
                    </span>

                </td>

                <td th:text="${p.categoria != null ? p.categoria.nombre : 'Sin categoría'}"></td>

                <td>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/productos/editar/{id}(id=${p.id})}">
                        Editar
                    </a>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                       onclick="return confirm('¿Desea eliminar este producto?')">
                        Eliminar
                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>

</html>
