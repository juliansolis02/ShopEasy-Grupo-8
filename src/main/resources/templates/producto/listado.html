<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
    <div class="se-subtitle">Administrador</div>
</header>

<nav class="se-nav">
    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/productos}">Gestión de Productos</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/productos/catalogo}">Ver Catálogo</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card">

        <h2 class="se-title">Gestión de Productos</h2>

        <div class="d-flex justify-content-end mb-4">
            <a class="se-btn-yellow"
               th:href="@{/productos/nuevo}">
                + Agregar Producto
            </a>
        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle se-table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Imagen</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Stock</th>
                    <th>Precio P/U</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="p : ${productos}"
                    th:classappend="${p.stock <= 5} ? 'table-warning' : ''">

                    <td th:text="${p.id}"></td>

                    <td>
                        <img th:if="${p.imagen != null and !#strings.isEmpty(p.imagen)}"
                             th:src="${p.imagen}"
                             width="65"
                             class="img-thumbnail">

                        <span th:if="${p.imagen == null or #strings.isEmpty(p.imagen)}">
                            Sin imagen
                        </span>
                    </td>

                    <td>
                        <strong th:text="${p.nombre}"></strong>
                        <br>
                        <small class="text-muted" th:text="${p.descripcion}"></small>
                    </td>

                    <td th:text="${p.categoria != null ? p.categoria.nombre : 'Sin categoría'}"></td>

                    <td>
                        <span th:text="${p.stock}"></span>

                        <span class="badge bg-danger ms-2"
                              th:if="${p.stock <= 5}">
                            Stock Bajo
                        </span>
                    </td>

                    <td>
                        ₡<span th:text="${p.precio}"></span>
                    </td>

                    <td>
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/productos/editar/{id}(id=${p.id})}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                           onclick="return confirm('¿Desea eliminar este producto?')">
                            Eliminar
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </section>

</main>

</body>
</html>
