<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${producto.nombre} + ' | ShopEasy'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
</header>

<nav class="se-nav">
    <a th:href="@{/productos/catalogo}">Inicio</a>
    <a th:href="@{/productos/catalogo}">Categorías</a>
    <a th:href="@{/historial}">Historial</a>
    <a th:href="@{/carrito}">Carrito</a>
    <a href="#">Mi Cuenta</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card">

        <div class="row align-items-center">

            <div class="col-md-5 text-center">

                <img th:if="${producto.imagen != null and !#strings.isEmpty(producto.imagen)}"
                     th:src="${producto.imagen}"
                     class="img-fluid rounded"
                     style="max-height:350px;">

                <p th:if="${producto.imagen == null or #strings.isEmpty(producto.imagen)}">
                    Sin imagen disponible
                </p>

            </div>

            <div class="col-md-7">

                <h2 class="fw-bold" th:text="${producto.nombre}"></h2>

                <h3 class="se-price mt-3">
                    ₡<span th:text="${producto.precio}"></span>
                </h3>

                <p class="text-muted">
                    <strong>Categoría:</strong>
                    <span th:text="${producto.categoria != null ? producto.categoria.nombre : 'Sin categoría'}"></span>
                </p>

                <p><strong>Descripción</strong></p>
                <p th:text="${producto.descripcion}"></p>

                <p>
                    <strong>Stock disponible:</strong>
                    <span th:text="${producto.stock}"></span>
                </p>

                <div class="mt-4">

                    <a th:href="@{/carrito/agregar/{id}(id=${producto.id})}"
                       class="se-btn-yellow d-inline-block">
                        🛒 Agregar al carrito
                    </a>

                    <a th:href="@{/productos/catalogo}"
                       class="se-btn-blue d-inline-block ms-2">
                        Volver
                    </a>

                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
