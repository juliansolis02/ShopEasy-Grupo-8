<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Carrito | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
</header>

<nav class="se-nav">
    <a th:href="@{/productos/catalogo}">Inicio</a>
    <a th:href="@{/productos/catalogo}">Categorías</a>
    <a th:href="@{/historial}">Historial</a>
    <a th:href="@{/carrito}">Carrito</a>
    <a href="#">Mi Cuenta</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card">

        <h2 class="se-title">Carrito de Compras</h2>

        <div th:if="${#lists.isEmpty(carrito)}"
             class="alert alert-warning text-center">
            Tu carrito está vacío.
        </div>

        <div th:if="${!#lists.isEmpty(carrito)}">

            <div class="table-responsive">

                <table class="table table-hover align-middle se-table">

                    <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${carrito}">

                        <td>
                            <strong th:text="${item.producto.nombre}"></strong>
                            <br>
                            <small class="text-muted"
                                   th:text="${item.producto.descripcion}">
                            </small>
                        </td>

                        <td>
                            ₡<span th:text="${item.producto.precio}"></span>
                        </td>

                        <td>

                            <a class="btn btn-sm btn-warning"
                               th:href="@{/carrito/disminuir/{id}(id=${item.producto.id})}">
                                -
                            </a>

                            <span class="mx-2 fw-bold"
                                  th:text="${item.cantidad}">
                            </span>

                            <a class="btn btn-sm btn-warning"
                               th:href="@{/carrito/aumentar/{id}(id=${item.producto.id})}">
                                +
                            </a>

                        </td>

                        <td>
                            ₡<span th:text="${item.subtotal}"></span>
                        </td>

                        <td>

                            <a class="btn btn-sm btn-danger"
                               th:href="@{/carrito/eliminar/{id}(id=${item.producto.id})}">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <div class="text-end mt-4">

                <h3 class="se-price">
                    Total: ₡<span th:text="${total}"></span>
                </h3>

                <a th:href="@{/checkout}"
                   class="se-btn-blue mt-3 d-inline-block">
                    Continuar al Checkout
                </a>

            </div>

        </div>

    </section>

</main>

</body>

</html>
