<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Checkout | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
</header>

<nav class="se-nav">
    <a th:href="@{/productos/catalogo}">Inicio</a>
    <a th:href="@{/productos/catalogo}">Categorías</a>
    <a th:href="@{/historial}">Historial</a>
    <a th:href="@{/carrito}">Carrito</a>
    <a href="#">Mi Cuenta</a>
</nav>

<main class="container mb-5">

    <section class="se-form-card">

        <h2 class="se-title">Checkout</h2>

        <form th:action="@{/checkout/confirmar}" method="post">

            <h5 class="fw-bold text-center mb-3">Dirección de entrega</h5>

            <div class="mb-3">
                <label class="form-label fw-bold">Provincia</label>
                <input type="text" name="provincia" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Cantón</label>
                <input type="text" name="canton" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Distrito</label>
                <input type="text" name="distrito" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Dirección exacta</label>
                <input type="text" name="direccion" class="form-control" required>
            </div>

            <h5 class="fw-bold text-center mb-3">Método de Pago</h5>

            <div class="d-flex justify-content-center gap-3 flex-wrap mb-4">

                <label class="btn btn-light border px-4">
                    <input type="radio" name="metodoPago" value="Tarjeta" required>
                    Tarjeta 💳
                </label>

                <label class="btn btn-light border px-4">
                    <input type="radio" name="metodoPago" value="Sinpe Móvil">
                    Sinpe Móvil 📱
                </label>

                <label class="btn btn-light border px-4">
                    <input type="radio" name="metodoPago" value="Efectivo">
                    Efectivo 💵
                </label>

            </div>

            <div class="text-center">
                <button type="submit" class="se-btn-blue">
                    Confirmar Compra
                </button>

                <a th:href="@{/carrito}" class="se-btn-yellow ms-2">
                    Volver
                </a>
            </div>

        </form>

    </section>

</main>

</body>
</html>
