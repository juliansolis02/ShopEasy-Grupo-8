<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Compra Confirmada | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
</header>

<nav class="se-nav">
    <a th:href="@{/productos/catalogo}">Inicio</a>
    <a th:href="@{/productos/catalogo}">Categorías</a>
    <a th:href="@{/historial}">Historial</a>
    <a th:href="@{/carrito}">Carrito</a>
    <a href="#">Mi Cuenta</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card text-center">

        <h2 class="se-title">Compra Confirmada</h2>

        <p class="fs-5">
            Tu pedido fue registrado correctamente.
        </p>

        <h3 class="se-price">
            Total pagado: ₡<span th:text="${total}"></span>
        </h3>

        <a th:href="@{/productos/catalogo}"
           class="se-btn-blue d-inline-block mt-4">
            Volver al catálogo
        </a>

    </section>

</main>

</body>
</html>
