<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
    <div class="se-subtitle">Administrador</div>
</header>

<nav class="se-nav">
    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/productos}">Gestión de Productos</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/productos/catalogo}">Ver Catálogo</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card text-center">

        <h2 class="se-title">Dashboard</h2>

        <div class="row justify-content-center g-4">

            <div class="col-md-4">
                <div class="se-product-card">
                    <h3 class="se-price" th:text="${totalProductos}">0</h3>
                    <p class="fw-bold text-primary">Productos registrados</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="se-product-card">
                    <h3 class="se-price" th:text="${totalCategorias}">0</h3>
                    <p class="fw-bold text-primary">Categorías registradas</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="se-product-card">
                    <h3 class="se-price" th:text="${stockBajo}">0</h3>
                    <p class="fw-bold text-primary">Productos con stock bajo</p>
                </div>
            </div>

        </div>

    </section>

</main>

</body>
</html>
