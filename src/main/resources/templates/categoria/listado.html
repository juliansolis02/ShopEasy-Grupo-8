<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Categorías | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
    <div class="se-subtitle">Administrador</div>
</header>

<nav class="se-nav">
    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/productos}">Gestión de Productos</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/productos/catalogo}">Ver Catálogo</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="se-title m-0">Gestión de Categorías</h2>

            <a th:href="@{/categorias/nuevo}"
               class="se-btn-yellow">
                <i class="bi bi-plus-circle"></i>
                Agregar Categoría
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle se-table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.id}"></td>

                    <td>
                        <strong th:text="${c.nombre}"></strong>
                    </td>

                    <td class="text-center">
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/categorias/editar/{id}(id=${c.id})}">
                            Editar
                        </a>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/categorias/eliminar/{id}(id=${c.id})}"
                           onclick="return confirm('¿Eliminar esta categoría?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>

    </section>

</main>

</body>
</html>
