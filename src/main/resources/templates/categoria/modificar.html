<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Categoría | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/shopeasy.css}">

</head>

<body>

<header class="se-header">

    <div class="se-logo-icon">🛒</div>

    <h1 class="se-logo">ShopEasy</h1>

    <div class="se-subtitle">
        Administrador
    </div>

</header>

<nav class="se-nav">

    <a th:href="@{/admin}">
        Dashboard
    </a>

    <a th:href="@{/productos}">
        Gestión de Productos
    </a>

    <a th:href="@{/categorias}">
        Categorías
    </a>

    <a th:href="@{/productos/catalogo}">
        Ver Catálogo
    </a>

</nav>

<main class="container mb-5">

    <section class="se-form-card">

        <h2 class="se-title">
            Formulario de Categoría
        </h2>

        <form th:action="@{/categorias/guardar}"
              th:object="${categoria}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="mb-4">

                <label class="form-label fw-bold">
                    Nombre de la categoría
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{nombre}"
                       placeholder="Ejemplo: Tecnología"
                       required>

            </div>

            <div class="d-flex justify-content-center gap-3">

                <button type="submit"
                        class="se-btn-blue">

                    Guardar Categoría

                </button>

                <a th:href="@{/categorias}"
                   class="se-btn-yellow">

                    Cancelar

                </a>

            </div>

        </form>

    </section>

</main>

</body>

</html>
