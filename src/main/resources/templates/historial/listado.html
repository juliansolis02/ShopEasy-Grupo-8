<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Historial | ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/shopeasy.css}">
</head>

<body>

<header class="se-header">
    <div class="se-logo-icon">🛒</div>
    <h1 class="se-logo">ShopEasy</h1>
</header>

<nav class="se-nav">
    <a th:href="@{/productos/catalogo}">Inicio</a>
    <a th:href="@{/productos/catalogo}">Categorías</a>
    <a th:href="@{/historial}">Historial</a>
    <a th:href="@{/carrito}">Carrito</a>
    <a href="#">Mi Cuenta</a>
</nav>

<main class="container mb-5">

    <section class="se-container-card">

        <h2 class="se-title">Historial de Compras</h2>

        <div th:if="${#lists.isEmpty(historial)}"
             class="alert alert-warning text-center">
            Aún no tienes compras registradas.
        </div>

        <div th:if="${!#lists.isEmpty(historial)}">

            <div class="card mb-4 shadow-sm"
                 th:each="compra : ${historial}">

                <div class="card-body">

                    <div class="d-flex justify-content-between flex-wrap">

                        <div>
                            <h5 class="fw-bold">
                                Compra #<span th:text="${compra.numero}"></span>
                            </h5>

                            <p class="mb-1">
                                <strong>Fecha:</strong>
                                <span th:text="${#temporals.format(compra.fecha, 'dd/MM/yyyy HH:mm')}"></span>
                            </p>

                            <p class="mb-1">
                                <strong>Estado:</strong>
                                <span class="badge bg-success"
                                      th:text="${compra.estado}">
                                </span>
                            </p>
                        </div>

                        <div class="text-end">
                            <h4 class="se-price">
                                ₡<span th:text="${compra.total}"></span>
                            </h4>
                        </div>

                    </div>

                    <hr>

                    <table class="table table-sm align-middle">
                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="item : ${compra.productos}">
                            <td th:text="${item.producto.nombre}"></td>
                            <td th:text="${item.cantidad}"></td>
                            <td>
                                ₡<span th:text="${item.subtotal}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
